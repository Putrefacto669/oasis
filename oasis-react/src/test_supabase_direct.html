<!DOCTYPE html>
<html>
<head>
    <title>Prueba Supabase</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🔌 Prueba de conexión a Supabase</h1>
    
    <div id="resultados"></div>

    <script>
        // Tus credenciales de Supabase
        const SUPABASE_URL = 'https://unkbcfqmgvfmxyvlcqpc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVua2JjZnFtZ3ZmbXh5dmxjcXBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MjY1ODQsImV4cCI6MjA5NTUwMjU4NH0.EeQ2srU-Ovni96AXSd_ZWblZMNgN1qwJYbUjCiBoiJE';

        const resultados = document.getElementById('resultados');

        async function testSupabase() {
            resultados.innerHTML = '<p>🔄 Probando conexión...</p>';
            
            try {
                // Prueba 1: Obtener habitaciones
                resultados.innerHTML += '<p>📊 Obteniendo habitaciones...</p>';
                const responseRooms = await fetch(`${SUPABASE_URL}/rest/v1/rooms?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const rooms = await responseRooms.json();
                resultados.innerHTML += `<p class="success">✅ Habitaciones encontradas: ${rooms.length}</p>`;
                resultados.innerHTML += `<pre>${JSON.stringify(rooms, null, 2)}</pre>`;
                
                // Prueba 2: Obtener reservas
                resultados.innerHTML += '<p>📊 Obteniendo reservas...</p>';
                const responseReservations = await fetch(`${SUPABASE_URL}/rest/v1/reservations?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const reservations = await responseReservations.json();
                resultados.innerHTML += `<p class="success">✅ Reservas encontradas: ${reservations.length}</p>`;
                resultados.innerHTML += `<pre>${JSON.stringify(reservations, null, 2)}</pre>`;
                
            } catch (error) {
                resultados.innerHTML += `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
        
        testSupabase();
    </script>
</body>
</html>
